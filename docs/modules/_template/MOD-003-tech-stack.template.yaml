  # 1. Purpose
  
  Record supported runtime, dependencies, environments, flags, and resource budgets for {{MODULE_TITLE}}.

  **Audience:** module engineers, platform engineers, operators, and security reviewers.
  **Action enabled:** select and verify supported module technology, configuration, dependencies, and budgets.

  ---
  
  # 2. Scope
  
  ## 2.1 In Scope
  
  - Runtime defaults, frameworks, data/auth dependencies, configuration, feature flags, and budgets.
  
  ## 2.2 Out of Scope
  
  - Secret values, platform-wide environment policy, and production promotion authorization.

  ## 2.3 Assumptions and unresolved questions

  List assumptions with an owner and validation path. Record unresolved questions with a decision owner and review trigger; never present them as accepted facts.

  ---
  
  # 3. Tech Stack
  
  ## 3.1 Runtime
  
  | Capability | Technology/version | Lifecycle posture | Repository evidence | Owning authority | Constraint |
  | ---------- | ------------------ | ----------------- | ------------------- | ---------------- | ---------- |
  | {{CAPABILITY}} | {{TECHNOLOGY_AND_VERSION}} | {{CURRENT_TARGET_OPTIONAL_RETIRED}} | {{PATH_OR_NOT_VERIFIABLE}} | {{DOC_ID}} | {{CONSTRAINT}} |
  
  ## 3.2 Frameworks and UI
  
  Record only module-specific choices or constraints. Link shared platform and design-system authorities instead of duplicating their catalogues.
  
  ## 3.3 Data access
  
  Identify approved access libraries, transaction boundary, connection mode, migration owner, and forbidden bypasses. Do not include credentials.
  
  ## 3.4 Authentication dependency
  
  Name the platform identity/session dependency and module integration point. Keep platform IAM decisions in ARCH-023 and module permission behavior in MOD-005.
  
  ## 3.5 Flags and environment
  
  | Setting | Purpose | Environment scope | Default/fail-closed state | Owner | Authority |
  | ------- | ------- | ----------------- | ------------------------- | ----- | --------- |
  | {{SETTING_NAME}} | {{PURPOSE}} | {{SCOPE}} | {{SAFE_DEFAULT}} | {{OWNER}} | {{DOC_ID}} |
  
  List key names only. Link platform composition and validation policy instead of copying secret values.
  
  ## 3.6 Local versus production
  
  State verified differences in runtime, data connection, integrations, flags, and observability. Label facts not verifiable in the current checkout.
  
  ## 3.7 Resource and performance budgets
  
  | Budget | Threshold | Measurement method | Enforcement gate | Owner |
  | ------ | --------- | ------------------ | ---------------- | ----- |
  | {{BUDGET}} | {{THRESHOLD}} | {{METHOD}} | {{GATE}} | {{OWNER}} |
  
