  # 1. Purpose
  
  Define the business journey, actors, capabilities, and domain ownership for {{MODULE_TITLE}}.

  **Audience:** product owners, domain engineers, process owners, and reviewers.
  **Action enabled:** agree the bounded context, business journey, language, invariants, and ownership.

