  # 1. Purpose
  
  Define operating gates, observability, recovery, promotion, and rollback for {{MODULE_TITLE}}.

  **Audience:** operators, service owners, release managers, and incident responders.
  **Action enabled:** promote, observe, recover, roll back, and escalate the module safely.

