  # 1. Purpose
  
  Define ports, adapters, schemas, error behavior, idempotency, and external integration contracts for {{MODULE_TITLE}}.

  **Audience:** application engineers, integration engineers, API reviewers, and operators.
  **Action enabled:** implement and verify stable contracts, adapters, idempotency, retries, and failure isolation.

