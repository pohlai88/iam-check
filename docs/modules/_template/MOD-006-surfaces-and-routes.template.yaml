  Define shell ownership, navigation entry, breadcrumbs, responsive regions, focus management, and boundaries with shared platform UI.
  
  ## 3.3 Surfaces and user journeys
  
  | Journey step | Surface | User intent | Primary action | Success transition | Recovery path |
