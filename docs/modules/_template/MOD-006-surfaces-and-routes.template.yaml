  # 1. Purpose
  
  Define product surfaces, routes, states, accessibility, and localization requirements for {{MODULE_TITLE}}.

  **Audience:** frontend engineers, designers, accessibility reviewers, and product owners.
  **Action enabled:** build and verify complete, accessible, localized, and recoverable user journeys.

  ---
  
  # 2. Scope
  
  ## 2.1 In Scope
  
  - Route inventory, layout/access gates, UI ownership, empty/loading/error states, accessibility, and localization.
  
  ## 2.2 Out of Scope
  
  - Shared-shell redesign, API contracts, and readiness evidence.

  ## 2.3 Assumptions and unresolved questions

  List assumptions with an owner and validation path. Record unresolved questions with a decision owner and review trigger; never present them as accepted facts.

  ---
  
