  Add exactly one evidence row for every additional AC in MOD-001 through MOD-008. Never redefine criterion text here.
  
  ## 3.3 Integration-chain evidence view
  
  | Chain/use case | Referenced ACs | Entry evidence | Boundary evidence | Persistence/side-effect evidence | Failure/recovery evidence | Result |
  | -------------- | -------------- | -------------- | ----------------- | -------------------------------- | ------------------------- | ------ |
  | {{CHAIN}} | {{AC_IDS}} | {{REFERENCE}} | {{REFERENCE}} | {{REFERENCE}} | {{REFERENCE}} | {{RESULT}} |
  
  This view may join sibling ACs but must not create new requirements or replace the structured evidence table.
  
  ## 3.4 Evidence semantics and update rules
  
  - PASS requires a reproducible reference, immutable or identifiable revision, and ISO evidence date.
  - FAIL, BLOCKED, and NOT EVIDENCED require a concrete blocker or rationale.
  - NOT ENABLED requires reproducible fail-closed evidence, revision, date, and authority-backed rationale.
  - Out of Scope requires Uncontracted activation, NOT ENABLED evidence, fail-closed proof, and owning authority.
  - Missing, stale, prose-only, or historically inferred evidence defaults to NOT EVIDENCED.
  
  ## 3.5 Done definition
  
  Verification is complete only when the AC/evidence join is one-to-one, active-profile dimensions are covered, evidence is current and reproducible, blockers have owners, and the resulting MOD-010 claim follows MOD-002 rules.

