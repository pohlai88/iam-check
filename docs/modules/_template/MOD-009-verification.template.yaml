  # 1. Purpose
  
  Own the structured evidence ledger for every acceptance criterion in {{MODULE_TITLE}} MOD-001…008.

  **Audience:** test engineers, release reviewers, control owners, and auditors.
  **Action enabled:** reproduce evidence and determine criterion results without inferring readiness from prose.

  ---
  
  # 2. Scope
  
  ## 2.1 In Scope
  
  - One-to-one requirement/evidence joins, activation, evidence status, references, revisions, dates, and blockers.
  
  ## 2.2 Out of Scope
  
  - Inventing requirements, changing ownership, or declaring readiness without valid evidence.

  ## 2.3 Assumptions and unresolved questions

  List assumptions with an owner and validation path. Record unresolved questions with a decision owner and review trigger; never present them as accepted facts.

  ---
  
