  # 1. Purpose
  
  Define authentication dependencies, tenant isolation, permissions, and sensitive-action controls for {{MODULE_TITLE}}.

  **Audience:** application engineers, security engineers, operators, and auditors.
  **Action enabled:** implement and verify identity, tenant, permission, deny, and abuse-control behavior.

  ---
  
  # 2. Scope
  
  ## 2.1 In Scope
  
  - Entry/session requirements, organization scope, permission catalogue, own-scope rules, audit, and abuse controls.
  
  ## 2.2 Out of Scope
  
  - Replacing platform IAM or tenancy authority and claiming readiness.

  ## 2.3 Assumptions and unresolved questions

  List assumptions with an owner and validation path. Record unresolved questions with a decision owner and review trigger; never present them as accepted facts.

