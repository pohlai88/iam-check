<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="#030406" name="theme-color">
    <title>Afenda — Polaris</title>
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@300&family=Inter:wght@300&display=swap"
      rel="stylesheet"
    >
    <style>
    @property --polaris-radius {
      syntax: "<length>";
      inherits: true;
      initial-value: 40px;
    }

    @property --charge {
      syntax: "<number>";
      inherits: true;
      initial-value: 0;
    }

    :root {
      --bg: #030406;
      --text: #f4f6f8;
      --muted: #7b8492;
      --gold: #d3c4a9;
      --ash: #8da4b8;
      --polaris-x: 50%;
      --polaris-y: 74%;
      --polaris-radius: 40px;
      --charge: 0;
      --ease: cubic-bezier(0.25, 1, 0.5, 1);
      --reveal: 3.2s;
      --flip: 2.2s;
      --morph-lead: 0.6s;
      --art: url("lynx-landing-standard.png");
    }

    html {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      margin: 0;
      overflow: hidden;
      font-family: Inter, sans-serif;
      font-weight: 300;
      color: var(--text);
      background: var(--bg);
    }

    .compare-nav {
      position: fixed;
      top: max(20px, env(safe-area-inset-top));
      left: 50%;
      z-index: 50;
      display: flex;
      gap: 12px;
      padding: 6px 8px;
      font-family: "JetBrains Mono", monospace;
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      background: rgba(3, 4, 6, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 999px;
      backdrop-filter: blur(20px);
      transform: translateX(-50%);
      transition: background 0.5s var(--ease);
    }

    .compare-nav:hover {
      background: rgba(3, 4, 6, 0.7);
    }

    .compare-nav a {
      padding: 8px 14px;
      color: rgba(244, 246, 248, 0.4);
      text-decoration: none;
      border-radius: 999px;
      transition:
        color 0.4s var(--ease),
        background 0.4s var(--ease);
    }

    .compare-nav a:hover {
      color: var(--text);
    }

    .compare-nav a:focus {
      outline: none;
    }

    .compare-nav a:focus-visible {
      outline: 1px solid var(--gold);
      outline-offset: 2px;
    }

    .compare-nav a.is-active {
      color: #030406;
      background: rgba(244, 246, 248, 0.95);
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .art-plane {
      position: absolute;
      inset: -4%;
      z-index: 0;
      animation: cinematicZoom 36s ease-in-out infinite alternate;
    }

    @keyframes cinematicZoom {
      from {
        transform: scale(1);
      }
      to {
        transform: scale(1.04);
      }
    }

    .hero-base,
    .hero-reveal,
    .hero-bloom {
      position: absolute;
      inset: 0;
      background: var(--art) center / cover no-repeat;
      -webkit-mask-image: linear-gradient(to right, transparent 6%, #000 60%);
      mask-image: linear-gradient(to right, transparent 6%, #000 60%);
    }

    .hero-base {
      filter: grayscale(85%) sepia(12%) brightness(0.4) contrast(115%);
      transition: filter var(--reveal) var(--ease);
    }

    body.is-revealed .hero-base {
      filter: grayscale(100%) brightness(0.15) contrast(130%);
    }

    .hero-bloom,
    .hero-reveal {
      z-index: 1;
      pointer-events: none;
      transform: scale(1.05);
      transform-origin: var(--polaris-x) var(--polaris-y);
      transition:
        clip-path var(--reveal) var(--ease),
        -webkit-clip-path var(--reveal) var(--ease),
        transform var(--reveal) var(--ease),
        filter var(--reveal) var(--ease),
        opacity var(--reveal) var(--ease);
    }

    .hero-reveal {
      filter: saturate(1.04) brightness(0.88);
      -webkit-clip-path: circle(
        var(--polaris-radius) at var(--polaris-x) var(--polaris-y)
      );
      clip-path: circle(
        var(--polaris-radius) at var(--polaris-x) var(--polaris-y)
      );
    }

    .hero-bloom {
      opacity: 0.28;
      filter: saturate(1.05) brightness(0.92) blur(28px);
      -webkit-clip-path: circle(
        calc(var(--polaris-radius) + 40px) at var(--polaris-x) var(--polaris-y)
      );
      clip-path: circle(
        calc(var(--polaris-radius) + 40px) at var(--polaris-x) var(--polaris-y)
      );
    }

    body.is-armed:not(.is-revealed) {
      --polaris-radius: calc(38px + var(--charge) * 64px);
    }

    body.is-revealed {
      --polaris-radius: 160vw;
    }

    body.is-revealed .hero-reveal {
      filter: saturate(1.08) brightness(1);
      transform: scale(1);
    }

    body.is-revealed .hero-bloom {
      opacity: 0;
      transform: scale(1);
    }

    .vignette {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: radial-gradient(
        circle at 55% 50%,
        transparent 22%,
        rgba(3, 4, 6, 0.45) 68%,
        rgba(3, 4, 6, 0.88) 100%
      );
      transition: opacity var(--reveal) var(--ease);
    }

    body.is-revealed .vignette {
      opacity: 0.55;
    }

    .corona {
      position: absolute;
      top: var(--polaris-y);
      left: var(--polaris-x);
      z-index: 3;
      width: calc(88px + var(--charge) * 120px);
      height: calc(88px + var(--charge) * 120px);
      pointer-events: none;
      background: radial-gradient(
        circle,
        color-mix(
            in srgb,
            var(--gold) calc(12% + var(--charge) * 18%),
            transparent
          )
          0%,
        color-mix(
            in srgb,
            var(--ash) calc(4% + var(--charge) * 10%),
            transparent
          )
          48%,
        transparent 76%
      );
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition:
        width 0.7s var(--ease),
        height 0.7s var(--ease),
        opacity 0.7s var(--ease);
    }

    body.is-revealed .corona {
      width: 0;
      height: 0;
      opacity: 0;
    }

    .frame {
      position: absolute;
      inset: 32px 40px;
      z-index: 4;
      pointer-events: none;
      border: 1px solid rgba(255, 255, 255, 0.035);
      transition: opacity var(--reveal) var(--ease);
    }

    body.is-revealed .frame {
      opacity: 0.2;
    }

    .brand {
      position: absolute;
      top: max(48px, env(safe-area-inset-top) + 32px);
      left: max(56px, env(safe-area-inset-left) + 32px);
      z-index: 5;
      display: flex;
      gap: 16px;
      align-items: center;
      font-family: "Cormorant Garamond", serif;
      font-size: 18px;
      font-weight: 400;
      color: rgba(244, 246, 248, 0.88);
      text-transform: uppercase;
      letter-spacing: 0.35em;
      pointer-events: none;
    }

    .brand__mark {
      width: 5px;
      height: 5px;
      background: var(--gold);
      opacity: 0.85;
      transform: rotate(45deg);
    }

    .copy {
      position: absolute;
      top: 50%;
      left: clamp(56px, 8vw, 120px);
      z-index: 6;
      max-width: min(22rem, 45vw);
      pointer-events: none;
      transform: translateY(-52%);
      perspective: 1200px;
      animation: copyIn 3s var(--ease) 0.5s both;
    }

    @keyframes copyIn {
      from {
        opacity: 0;
        transform: translateY(calc(-52% + 16px));
      }
      to {
        opacity: 1;
        transform: translateY(-52%);
      }
    }

    .word-truth {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(64px, 8.5vw, 100px);
      font-weight: 300;
      line-height: 0.9;
      color: var(--text);
      -webkit-text-stroke: 0 transparent;
      letter-spacing: -0.01em;
      text-wrap: balance;
      text-shadow: 0 10px 36px rgba(0, 0, 0, 0.32);
      transform-origin: 35% 55%;
      transition: letter-spacing 0.6s var(--ease);
    }

    body.is-armed:not(.is-unlocked) .word-truth {
      letter-spacing: 0.02em;
    }

    body.is-unlocked .word-truth {
      animation: flipWord var(--flip) var(--ease) var(--morph-lead) forwards;
    }

    .word-truth.is-reversing {
      animation: flipWordBack var(--flip) var(--ease) forwards;
    }

    @keyframes flipWord {
      0% {
        transform: rotateX(0) scale(1);
        opacity: 1;
        color: var(--text);
        -webkit-text-stroke: 0 transparent;
      }
      45% {
        transform: rotateX(90deg) scale(1.015);
        opacity: 0.18;
      }
      100% {
        transform: rotateX(180deg) scale(1);
        opacity: 1;
        color: transparent;
        -webkit-text-stroke: 1px var(--gold);
      }
    }

    @keyframes flipWordBack {
      0% {
        transform: rotateX(180deg);
        opacity: 1;
        color: transparent;
        -webkit-text-stroke: 1px var(--gold);
      }
      50% {
        transform: rotateX(90deg) scale(1.01);
        opacity: 0.18;
      }
      100% {
        transform: rotateX(0);
        opacity: 1;
        color: var(--text);
        -webkit-text-stroke: 0 transparent;
      }
    }

    .dek {
      margin: 0.8rem 0 0;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(24px, 2.8vw, 34px);
      font-style: italic;
      font-weight: 300;
      line-height: 1.3;
      color: rgba(244, 246, 248, 0.62);
      letter-spacing: 0.02em;
      text-wrap: pretty;
      transition:
        color var(--flip) var(--ease),
        opacity var(--reveal) var(--ease),
        transform var(--flip) var(--ease);
    }

    body.is-unlocked .dek {
      color: var(--gold);
      opacity: 0.82;
      transform: translateY(5px);
    }

    .support {
      max-width: 16rem;
      margin: 1.5rem 0 0;
      font-size: 13px;
      line-height: 1.65;
      color: var(--muted);
      letter-spacing: 0.01em;
      text-wrap: pretty;
      transition: opacity var(--reveal) var(--ease);
    }

    body.is-revealed .support {
      opacity: 0.4;
    }

    .vanguard {
      position: absolute;
      top: var(--polaris-y);
      left: var(--polaris-x);
      z-index: 20;
      width: 150px;
      height: 170px;
      padding: 0;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      background: transparent;
      border: none;
      border-radius: 50% 50% 42% 42% / 58% 58% 42% 42%;
      filter: drop-shadow(
        0 0 calc(3px + var(--charge) * 14px)
          color-mix(in srgb, var(--ash) calc(var(--charge) * 32%), transparent)
      );
      transform: translate(-50%, -50%) scale(calc(1 + var(--charge) * 0.025));
      transition:
        transform 0.55s var(--ease),
        filter 0.55s var(--ease);
    }

    .vanguard:focus {
      outline: none;
    }

    .vanguard:focus-visible {
      outline: 1px solid color-mix(in srgb, var(--gold) 55%, transparent);
      outline-offset: 12px;
    }

    .vanguard__label {
      position: absolute;
      top: calc(100% - 12px);
      left: 50%;
      font-family: "JetBrains Mono", monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      white-space: nowrap;
      opacity: calc(var(--charge) * 0.75);
      transform: translateX(-50%);
      transition:
        opacity 0.45s var(--ease),
        color 0.45s var(--ease),
        letter-spacing 0.45s var(--ease);
    }

    body.is-unlocked .vanguard__label,
    body.is-revealed .vanguard__label {
      color: var(--gold);
      letter-spacing: 0.38em;
      opacity: 0.85;
    }

    @media (max-width: 900px) {
      .copy {
        left: 32px;
        max-width: 75vw;
      }

      .word-truth {
        font-size: clamp(52px, 13vw, 76px);
      }

      .brand {
        top: max(56px, env(safe-area-inset-top) + 40px);
        left: 32px;
        font-size: 15px;
      }

      .frame {
        inset: 20px 24px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .art-plane,
      .copy,
      .word-truth {
        animation: none !important;
      }

      .copy {
        opacity: 1;
        transform: translateY(-52%);
      }

      :root {
        --reveal: 0.01ms;
        --flip: 0.01ms;
        --morph-lead: 0ms;
      }
    }
    </style>
  </head>
  <body>
    <nav aria-label="Presentation comparison" class="compare-nav">
      <a class="is-active" href="/lynx/lynx-overlay.html">Polaris Grid</a>
      <a href="/lynx/lynx-cinematic.html">Cinematic</a>
      <a href="/lynx/lynx-hybrid.html">Hybrid</a>
      <a href="/lynx/lynx-the-machine.html">Machine</a>
      <a href="/lynx/lynx-bg-light.html">Light BG</a>
    </nav>

    <main class="stage">
      <div aria-hidden="true" class="art-plane">
        <div class="hero-base"></div>
        <div class="hero-bloom"></div>
        <div class="hero-reveal"></div>
      </div>

      <div aria-hidden="true" class="vignette"></div>
      <div aria-hidden="true" class="corona"></div>
      <div aria-hidden="true" class="frame"></div>

      <div class="brand" translate="no">
        <span aria-hidden="true" class="brand__mark"></span>
        Afenda
      </div>

      <div class="copy">
        <h1 class="word-truth" id="word-truth">Truth</h1>
        <p class="dek">is protected.</p>
        <p class="support">Guarded quietly. Revealed only by intent.</p>
      </div>

      <button
        aria-label="Unlock vault at the lynx shield"
        aria-pressed="false"
        class="vanguard"
        id="polaris-btn"
        type="button"
      >
        <span class="vanguard__label">Unlock</span>
      </button>
    </main>

    <script>
    "use strict";

    const SHIELD = { x: 0.5, y: 0.742 };
    const CHARGE_RADIUS = 260;
    const ARM_ENTER = 0.22;
    const PREVIEW_ENTER = 0.72;
    const PREVIEW_EXIT = 0.42;

    let naturalW = 0;
    let naturalH = 0;
    let shieldX = 0;
    let shieldY = 0;
    let latched = false;
    let armed = false;
    let previewing = false;
    let chargeLockout = false;

    const btn = document.getElementById("polaris-btn");
    const label = btn.querySelector(".vanguard__label");
    const word = document.getElementById("word-truth");

    function coverPoint(nx, ny, vw, vh, iw, ih) {
      const scale = Math.max(vw / iw, vh / ih);
      const rw = iw * scale;
      const rh = ih * scale;
      return {
        x: (vw - rw) / 2 + nx * rw,
        y: (vh - rh) / 2 + ny * rh,
      };
    }

    function updateShield() {
      if (!(naturalW && naturalH)) {
        return;
      }
      const p = coverPoint(
        SHIELD.x,
        SHIELD.y,
        innerWidth,
        innerHeight,
        naturalW,
        naturalH
      );
      shieldX = p.x;
      shieldY = p.y;
      document.documentElement.style.setProperty("--polaris-x", `${p.x}px`);
      document.documentElement.style.setProperty("--polaris-y", `${p.y}px`);
    }

    function setCharge(v) {
      const c = Math.max(0, Math.min(1, v));
      document.documentElement.style.setProperty("--charge", c.toFixed(3));
      return c;
    }

    function sync() {
      document.body.classList.toggle("is-armed", armed || latched);
      document.body.classList.toggle(
        "is-revealed",
        latched || (previewing && !chargeLockout)
      );
      document.body.classList.toggle("is-unlocked", latched);
    }

    function morph(next) {
      if (next) {
        word.classList.remove("is-reversing");
        return;
      }
      word.classList.remove("is-reversing");
      void word.offsetWidth;
      word.classList.add("is-reversing");
      const onEnd = (e) => {
        if (e.animationName !== "flipWordBack") {
          return;
        }
        word.classList.remove("is-reversing");
        word.removeEventListener("animationend", onEnd);
      };
      word.addEventListener("animationend", onEnd);
    }

    function onMove(e) {
      if (latched) {
        setCharge(1);
        armed = true;
        previewing = true;
        sync();
        return;
      }
      if (chargeLockout) {
        return;
      }
      const dist = Math.hypot(e.clientX - shieldX, e.clientY - shieldY);
      const charge = setCharge(1 - dist / CHARGE_RADIUS);
      armed = charge >= ARM_ENTER;
      if (!previewing && charge >= PREVIEW_ENTER) {
        previewing = true;
      } else if (previewing && charge <= PREVIEW_EXIT) {
        previewing = false;
      }
      sync();
    }

    function toggle() {
      const was = latched;
      latched = !latched;
      if (latched) {
        chargeLockout = false;
        armed = true;
        previewing = true;
        setCharge(1);
      } else {
        chargeLockout = true;
        armed = false;
        previewing = false;
        setCharge(0);
      }
      btn.setAttribute("aria-pressed", String(latched));
      label.textContent = latched ? "Seal" : "Unlock";
      if (was !== latched) {
        morph(latched);
      }
      sync();
    }

    const img = new Image();
    img.onload = () => {
      naturalW = img.naturalWidth;
      naturalH = img.naturalHeight;
      updateShield();
    };
    img.src = "lynx-landing-standard.png";

    addEventListener("resize", updateShield);
    addEventListener("pointermove", onMove, { passive: true });
    btn.addEventListener("click", toggle);
    btn.addEventListener("pointerleave", () => {
      if (!latched) {
        chargeLockout = false;
      }
    });
    </script>
  </body>
</html>
