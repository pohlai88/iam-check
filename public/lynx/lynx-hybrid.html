<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="#030406" name="theme-color">
    <title>Afenda — Hybrid</title>
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Instrument+Sans:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@300;400&display=swap"
      rel="stylesheet"
    >
    <style>
    @property --polaris-radius {
      syntax: "<length>";
      inherits: true;
      initial-value: 40px;
    }

    @property --charge {
      syntax: "<number>";
      inherits: true;
      initial-value: 0;
    }

    :root {
      --bg: #030406;
      --text: #f4f6f8;
      --muted: #7b8492;
      --gold: #d3c4a9;
      --accent: #8da4b8;
      --hairline: rgba(255, 255, 255, 0.05);

      --font-display: "Cormorant Garamond", "Times New Roman", Times, serif;
      --font-text: "Instrument Sans", "Segoe UI", sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, monospace;

      --fs-brand: 0.6875rem;
      --fs-display: clamp(4.25rem, 9.2vw, 7rem);
      --fs-dek: clamp(1.35rem, 2.35vw, 1.85rem);
      --fs-support: 0.8125rem;
      --fs-chrome: 0.5rem;

      --lh-display: 0.86;
      --lh-dek: 1.22;
      --lh-support: 1.7;

      --track-brand: 0.46em;
      --track-display: -0.035em;
      --track-dek: 0.012em;
      --track-support: 0.035em;
      --track-chrome: 0.24em;

      --measure-copy: min(19rem, 38vw);
      --measure-support: 28ch;

      --polaris-x: 50%;
      --polaris-y: 74%;
      --polaris-radius: 40px;
      --charge: 0;
      --ease: cubic-bezier(0.25, 1, 0.5, 1);
      --reveal: 3.2s;
      --flip: 2.2s;
      --chrome: 0.55s;
      --morph-lead: 0.6s;
      --art: url("lynx-landing-standard.png");
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color-scheme: dark;
      text-rendering: optimizeLegibility;
    }

    * {
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      margin: 0;
      overflow: hidden;
      font-family: var(--font-text);
      font-synthesis: none;
      color: var(--text);
      background: var(--bg);
    }

    .compare-nav {
      position: fixed;
      top: max(20px, env(safe-area-inset-top));
      left: 50%;
      z-index: 50;
      display: flex;
      gap: 4px;
      padding: 5px 6px;
      font-family: var(--font-mono);
      font-size: var(--fs-chrome);
      font-weight: 300;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: var(--track-chrome);
      background: rgba(3, 4, 6, 0.35);
      border: 1px solid var(--hairline);
      border-radius: 999px;
      backdrop-filter: blur(20px);
      transform: translateX(-50%);
      transition: background var(--chrome) var(--ease);
    }

    .compare-nav:hover {
      background: rgba(3, 4, 6, 0.62);
    }

    .compare-nav a {
      padding: 8px 14px;
      color: rgba(244, 246, 248, 0.38);
      text-decoration: none;
      border-radius: 999px;
      transition:
        color var(--chrome) var(--ease),
        background var(--chrome) var(--ease);
    }

    .compare-nav a:hover {
      color: rgba(244, 246, 248, 0.82);
    }

    .compare-nav a:focus {
      outline: none;
    }

    .compare-nav a:focus-visible {
      outline: 1px solid rgba(211, 196, 169, 0.55);
      outline-offset: 2px;
    }

    .compare-nav a.is-active {
      color: rgba(244, 246, 248, 0.92);
      background: rgba(255, 255, 255, 0.06);
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .art-plane {
      position: absolute;
      inset: -4%;
      z-index: 0;
      animation: cinematicZoom 30s ease-in-out infinite alternate;
    }

    @keyframes cinematicZoom {
      from {
        transform: scale(1);
      }
      to {
        transform: scale(1.05);
      }
    }

    .hero-base,
    .hero-reveal,
    .hero-bloom {
      position: absolute;
      inset: 0;
      background: var(--art) center / cover no-repeat;
      -webkit-mask-image: linear-gradient(to right, transparent 6%, #000 60%);
      mask-image: linear-gradient(to right, transparent 6%, #000 60%);
    }

    .hero-base {
      filter: grayscale(85%) sepia(12%) brightness(0.4) contrast(115%);
      transition: filter var(--reveal) var(--ease);
    }

    body.is-revealed .hero-base {
      filter: grayscale(100%) brightness(0.15) contrast(130%);
    }

    .hero-bloom,
    .hero-reveal {
      z-index: 1;
      pointer-events: none;
      transform: scale(1.06);
      transform-origin: var(--polaris-x) var(--polaris-y);
      transition:
        clip-path var(--reveal) var(--ease),
        -webkit-clip-path var(--reveal) var(--ease),
        transform var(--reveal) var(--ease),
        filter var(--reveal) var(--ease),
        opacity var(--reveal) var(--ease);
    }

    .hero-reveal {
      filter: saturate(1.05) brightness(0.85);
      clip-path: circle(
        var(--polaris-radius) at var(--polaris-x) var(--polaris-y)
      );
    }

    .hero-bloom {
      opacity: 0.35;
      filter: saturate(1.1) brightness(0.9) blur(24px);
      clip-path: circle(
        calc(var(--polaris-radius) + 36px) at var(--polaris-x) var(--polaris-y)
      );
    }

    body.is-armed:not(.is-revealed) {
      --polaris-radius: calc(38px + var(--charge) * 64px);
    }

    body.is-revealed {
      --polaris-radius: 160vw;
    }

    body.is-revealed .hero-reveal {
      filter: saturate(1.1) brightness(1);
      transform: scale(1);
    }

    body.is-revealed .hero-bloom {
      opacity: 0;
      transform: scale(1);
    }

    .vignette {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: radial-gradient(
        circle at 55% 50%,
        transparent 20%,
        rgba(3, 4, 6, 0.5) 65%,
        rgba(3, 4, 6, 0.9) 100%
      );
      transition: opacity var(--reveal) var(--ease);
    }

    body.is-revealed .vignette {
      opacity: 0.65;
    }

    .corona {
      position: absolute;
      top: var(--polaris-y);
      left: var(--polaris-x);
      z-index: 3;
      width: calc(100px + var(--charge) * 160px);
      height: calc(100px + var(--charge) * 160px);
      pointer-events: none;
      background: radial-gradient(
        circle,
        rgba(211, 196, 169, calc(0.14 + var(--charge) * 0.22)) 0%,
        rgba(141, 164, 184, calc(0.05 + var(--charge) * 0.14)) 45%,
        transparent 75%
      );
      border-radius: 50%;
      mix-blend-mode: screen;
      transform: translate(-50%, -50%);
      transition:
        width var(--chrome) var(--ease),
        height var(--chrome) var(--ease),
        opacity var(--chrome) var(--ease);
    }

    body.is-revealed .corona {
      width: 0;
      height: 0;
      opacity: 0;
    }

    /* Editorial margin — corner ticks, not a dashboard inset */
    .frame {
      position: absolute;
      inset: 36px 44px;
      z-index: 4;
      pointer-events: none;
      opacity: 0.7;
      transition: opacity var(--reveal) var(--ease);
    }

    .frame__tick {
      position: absolute;
      width: 28px;
      height: 28px;
      border: 1px solid var(--hairline);
    }

    .frame__tick--tl {
      top: 0;
      left: 0;
      border-right: none;
      border-bottom: none;
    }

    .frame__tick--tr {
      top: 0;
      right: 0;
      border-bottom: none;
      border-left: none;
    }

    .frame__tick--bl {
      bottom: 0;
      left: 0;
      border-top: none;
      border-right: none;
    }

    .frame__tick--br {
      right: 0;
      bottom: 0;
      border-top: none;
      border-left: none;
    }

    body.is-revealed .frame {
      opacity: 0.28;
    }

    .brand {
      position: absolute;
      top: max(48px, env(safe-area-inset-top) + 32px);
      left: max(56px, env(safe-area-inset-left) + 32px);
      z-index: 5;
      display: flex;
      gap: 12px;
      align-items: center;
      font-family: var(--font-mono);
      font-size: var(--fs-brand);
      font-weight: 300;
      line-height: 1;
      color: rgba(244, 246, 248, 0.48);
      text-transform: uppercase;
      letter-spacing: var(--track-brand);
      pointer-events: none;
      transition: color var(--reveal) var(--ease);
    }

    body.is-unlocked .brand {
      color: rgba(211, 196, 169, 0.72);
    }

    .brand__mark {
      width: 4px;
      height: 4px;
      background: var(--gold);
      box-shadow: 0 0 12px rgba(211, 196, 169, 0.25);
      opacity: 0.7;
      transform: rotate(45deg);
    }

    .copy {
      position: absolute;
      top: 50%;
      left: clamp(56px, 8vw, 120px);
      z-index: 6;
      max-width: var(--measure-copy);
      pointer-events: none;
      transform: translateY(-52%);
      animation: copyIn 3s var(--ease) 0.45s both;
    }

    @keyframes copyIn {
      from {
        opacity: 0;
        transform: translateY(calc(-52% + 18px));
      }
      to {
        opacity: 1;
        transform: translateY(-52%);
      }
    }

    .word-truth {
      margin: 0;
      font-family: var(--font-display);
      font-size: var(--fs-display);
      font-style: normal;
      font-weight: 400;
      font-feature-settings:
        "kern" 1,
        "liga" 1;
      font-variant-ligatures: common-ligatures;
      line-height: var(--lh-display);
      color: var(--text);
      -webkit-text-stroke: 0 transparent;
      letter-spacing: var(--track-display);
      text-wrap: balance;
      text-shadow: 0 14px 44px rgba(0, 0, 0, 0.45);
      transform-origin: 35% 55%;
    }

    body.is-unlocked .word-truth {
      animation: flipWord var(--flip) var(--ease) var(--morph-lead) forwards;
    }

    .word-truth.is-reversing {
      animation: flipWordBack var(--flip) var(--ease) forwards;
    }

    @keyframes flipWord {
      0% {
        transform: rotateX(0) scale(1);
        opacity: 1;
        color: var(--text);
        -webkit-text-stroke: 0 transparent;
      }
      45% {
        transform: rotateX(90deg) scale(1.01);
        opacity: 0.2;
      }
      100% {
        transform: rotateX(180deg) scale(1);
        opacity: 1;
        color: transparent;
        -webkit-text-stroke: 1px var(--gold);
      }
    }

    @keyframes flipWordBack {
      0% {
        transform: rotateX(180deg);
        opacity: 1;
        color: transparent;
        -webkit-text-stroke: 1px var(--gold);
      }
      50% {
        transform: rotateX(90deg) scale(1.005);
        opacity: 0.2;
      }
      100% {
        transform: rotateX(0);
        opacity: 1;
        color: var(--text);
        -webkit-text-stroke: 0 transparent;
      }
    }

    .dek {
      margin: 0.55rem 0 0;
      font-family: var(--font-display);
      font-size: var(--fs-dek);
      font-style: italic;
      font-weight: 300;
      font-feature-settings:
        "kern" 1,
        "liga" 1;
      line-height: var(--lh-dek);
      color: rgba(244, 246, 248, 0.58);
      letter-spacing: var(--track-dek);
      text-wrap: pretty;
      transition:
        color var(--flip) var(--ease),
        opacity var(--reveal) var(--ease),
        transform var(--flip) var(--ease);
    }

    body.is-unlocked .dek {
      color: var(--gold);
      opacity: 0.88;
      transform: translateY(5px);
    }

    .support {
      position: relative;
      max-width: var(--measure-support);
      padding-top: 1.15rem;
      margin: 1.75rem 0 0;
      font-family: var(--font-text);
      font-size: var(--fs-support);
      font-weight: 400;
      line-height: var(--lh-support);
      color: var(--muted);
      letter-spacing: var(--track-support);
      text-wrap: pretty;
      transition: opacity var(--reveal) var(--ease);
    }

    .support::before {
      position: absolute;
      top: 0;
      left: 0;
      width: 1.75rem;
      height: 1px;
      content: "";
      background: rgba(211, 196, 169, 0.35);
      transition:
        width var(--reveal) var(--ease),
        background var(--reveal) var(--ease);
    }

    body.is-unlocked .support::before {
      width: 2.75rem;
      background: rgba(211, 196, 169, 0.55);
    }

    body.is-revealed .support {
      opacity: 0.5;
    }

    .vanguard {
      position: absolute;
      top: var(--polaris-y);
      left: var(--polaris-x);
      z-index: 20;
      width: 150px;
      height: 170px;
      padding: 0;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      background: transparent;
      border: none;
      border-radius: 50% 50% 42% 42% / 58% 58% 42% 42%;
      filter: drop-shadow(
        0 0 calc(4px + var(--charge) * 18px)
          rgba(141, 164, 184, calc(var(--charge) * 0.38))
      );
      transform: translate(-50%, -50%) scale(calc(1 + var(--charge) * 0.03));
      transition:
        transform var(--chrome) var(--ease),
        filter var(--chrome) var(--ease);
    }

    .vanguard:focus {
      outline: none;
    }

    .vanguard:focus-visible {
      outline: 1px solid rgba(211, 196, 169, 0.5);
      outline-offset: 12px;
    }

    .vanguard__label {
      position: absolute;
      top: calc(100% - 12px);
      left: 50%;
      font-family: var(--font-mono);
      font-size: var(--fs-chrome);
      font-weight: 300;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      white-space: nowrap;
      opacity: calc(var(--charge) * 0.75);
      transform: translateX(-50%);
      transition:
        opacity var(--chrome) var(--ease),
        color var(--chrome) var(--ease),
        letter-spacing var(--chrome) var(--ease);
    }

    body.is-unlocked .vanguard__label,
    body.is-revealed .vanguard__label {
      color: var(--gold);
      letter-spacing: 0.38em;
      opacity: 0.88;
    }

    @media (max-width: 900px) {
      :root {
        --measure-copy: min(88vw, 22rem);
        --fs-display: clamp(3.5rem, 14vw, 5.25rem);
        --fs-dek: clamp(1.2rem, 4.2vw, 1.55rem);
      }

      .copy {
        left: 32px;
      }

      .brand {
        top: max(56px, env(safe-area-inset-top) + 40px);
        left: 32px;
      }

      .frame {
        inset: 22px 26px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .art-plane,
      .copy,
      .word-truth {
        animation: none !important;
      }

      .copy {
        opacity: 1;
        transform: translateY(-52%);
      }

      :root {
        --reveal: 0.01ms;
        --flip: 0.01ms;
        --chrome: 0.01ms;
        --morph-lead: 0ms;
      }
    }
    </style>
  </head>
  <body>
    <nav aria-label="Presentation comparison" class="compare-nav">
      <a href="/lynx/lynx-overlay.html">Polaris Grid</a>
      <a href="/lynx/lynx-cinematic.html">Cinematic</a>
      <a class="is-active" href="/lynx/lynx-hybrid.html">Hybrid</a>
      <a href="/lynx/lynx-the-machine.html">Machine</a>
      <a href="/lynx/lynx-bg-light.html">Light BG</a>
    </nav>

    <main class="stage">
      <div aria-hidden="true" class="art-plane">
        <div class="hero-base"></div>
        <div class="hero-bloom"></div>
        <div class="hero-reveal"></div>
      </div>

      <div aria-hidden="true" class="vignette"></div>
      <div aria-hidden="true" class="corona"></div>
      <div aria-hidden="true" class="frame">
        <span class="frame__tick frame__tick--tl"></span>
        <span class="frame__tick frame__tick--tr"></span>
        <span class="frame__tick frame__tick--bl"></span>
        <span class="frame__tick frame__tick--br"></span>
      </div>

      <div class="brand" translate="no">
        <span aria-hidden="true" class="brand__mark"></span>
        Afenda
      </div>

      <div class="copy">
        <h1 class="word-truth" id="word-truth">Truth</h1>
        <p class="dek">is protected.</p>
        <p class="support">Guarded quietly. Revealed only by intent.</p>
      </div>

      <button
        aria-label="Unlock vault at the lynx shield"
        aria-pressed="false"
        class="vanguard"
        id="polaris-btn"
        type="button"
      >
        <span class="vanguard__label">Unlock</span>
      </button>
    </main>

    <script>
    "use strict";

    const SHIELD = { x: 0.5, y: 0.742 };
    const CHARGE_RADIUS = 240;
    const ARM_ENTER = 0.22;
    const PREVIEW_ENTER = 0.72;
    const PREVIEW_EXIT = 0.42;

    let naturalW = 0;
    let naturalH = 0;
    let shieldX = 0;
    let shieldY = 0;
    let latched = false;
    let armed = false;
    let previewing = false;
    let chargeLockout = false;

    function coverPoint(nx, ny, vw, vh, iw, ih) {
      const scale = Math.max(vw / iw, vh / ih);
      const rw = iw * scale;
      const rh = ih * scale;
      return {
        x: (vw - rw) / 2 + nx * rw,
        y: (vh - rh) / 2 + ny * rh,
      };
    }

    function updateShield() {
      if (!(naturalW && naturalH)) {
        return;
      }
      const p = coverPoint(
        SHIELD.x,
        SHIELD.y,
        innerWidth,
        innerHeight,
        naturalW,
        naturalH
      );
      shieldX = p.x;
      shieldY = p.y;
      document.documentElement.style.setProperty("--polaris-x", `${p.x}px`);
      document.documentElement.style.setProperty("--polaris-y", `${p.y}px`);
    }

    function setCharge(v) {
      const c = Math.max(0, Math.min(1, v));
      document.documentElement.style.setProperty("--charge", c.toFixed(3));
      return c;
    }

    function sync() {
      document.body.classList.toggle("is-armed", armed || latched);
      document.body.classList.toggle(
        "is-revealed",
        latched || (previewing && !chargeLockout)
      );
      document.body.classList.toggle("is-unlocked", latched);
    }

    function morph(next) {
      const word = document.getElementById("word-truth");
      if (next) {
        word.classList.remove("is-reversing");
        return;
      }
      word.classList.remove("is-reversing");
      void word.offsetWidth;
      word.classList.add("is-reversing");
      const onEnd = (e) => {
        if (e.animationName !== "flipWordBack") {
          return;
        }
        word.classList.remove("is-reversing");
        word.removeEventListener("animationend", onEnd);
      };
      word.addEventListener("animationend", onEnd);
    }

    function onMove(e) {
      if (latched) {
        setCharge(1);
        armed = true;
        previewing = true;
        sync();
        return;
      }
      if (chargeLockout) {
        return;
      }
      const dist = Math.hypot(e.clientX - shieldX, e.clientY - shieldY);
      const charge = setCharge(1 - dist / CHARGE_RADIUS);
      armed = charge >= ARM_ENTER;
      if (!previewing && charge >= PREVIEW_ENTER) {
        previewing = true;
      } else if (previewing && charge <= PREVIEW_EXIT) {
        previewing = false;
      }
      sync();
    }

    function toggle() {
      const was = latched;
      latched = !latched;
      if (latched) {
        chargeLockout = false;
        armed = true;
        previewing = true;
        setCharge(1);
      } else {
        chargeLockout = true;
        armed = false;
        previewing = false;
        setCharge(0);
      }
      const btn = document.getElementById("polaris-btn");
      btn.setAttribute("aria-pressed", String(latched));
      btn.querySelector(".vanguard__label").textContent = latched
        ? "Seal"
        : "Unlock";
      if (was !== latched) {
        morph(latched);
      }
      sync();
    }

    const img = new Image();
    img.onload = () => {
      naturalW = img.naturalWidth;
      naturalH = img.naturalHeight;
      updateShield();
    };
    img.src = "lynx-landing-standard.png";

    addEventListener("resize", updateShield);
    addEventListener("pointermove", onMove, { passive: true });
    document.getElementById("polaris-btn").addEventListener("click", toggle);
    document
      .getElementById("polaris-btn")
      .addEventListener("pointerleave", () => {
        if (!latched) {
          chargeLockout = false;
        }
      });
    </script>
  </body>
</html>
