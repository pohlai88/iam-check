# Schema write-ownership register (sole mutator)
# Dual control: ERP mutationTables in module.manifest.ts must match writeOwner rows.
# Platform sole-mutator rows are hand-authored here (no ERP manifest).
# Schema DDL / migrations stay in @afenda/db — hosting a table does not grant write ownership.
# Version: schema-ownership/2026-07-21
# Authority: docs-V2/monorepo · LAYERS.md · packages/README.md · validate:modules

version: "schema-ownership/2026-07-21"
updated: "2026-07-21"
authority: packages-catalog-production-governance

invariant: |
  A package may read a foreign-owned table only through an approved query port,
  projection, or registered read edge. It may never insert, update, or delete a
  foreign-owned table. Direct table writes are allowed only inside the package
  named as writeOwner.

schemaHost: "@afenda/db"

