  /api/health/readiness:
    get:
      summary: Dependency readiness probe
      description: "DB / auth dependency snapshot. Prefer Cache-Control: no-store. HTTP 503 when status is
        not_ready (critical storage unreachable); 200 for ready and degraded."
      tags:
        - Health
      responses:
        "200":
          description: Ready or degraded snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessEnvelope"
        "503":
          description: "Not ready — critical dependency (postgres) unreachable; body still `{ data:
            ReadinessResponse }`"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessEnvelope"
      operationId: getHealthReadiness
      x-afenda-status: api-now
  /api/metrics:
    get:
      summary: Prometheus metrics scrape
      description: "Prometheus text exposition from @afenda/metrics. Requires Authorization: Bearer
        matching METRICS_SCRAPE_TOKEN. Fail closed when token unset (404)."
