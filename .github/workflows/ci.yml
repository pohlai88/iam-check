# ARCH-028 S8.1 — CI quality gate (turbo lint · typecheck · test)
# Remote cache: TURBO_TOKEN (Actions secret) + TURBO_TEAM (Actions variable)
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · typecheck · test
    timeout-minutes: 20
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Resolve pnpm from package.json "packageManager" (Corepack pin). Do not
      # also set "version" — pnpm/action-setup rejects dual sources.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Database migration journal check
        run: pnpm --filter @afenda/db db:check

      - name: Biome CI
        run: pnpm run lint:ci

      - name: Typecheck · test
        run: pnpm exec turbo run typecheck test
