name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  NEON_AUTH_BASE_URL: ${{ secrets.NEON_AUTH_BASE_URL }}
  NEON_AUTH_COOKIE_SECRET: ${{ secrets.NEON_AUTH_COOKIE_SECRET }}
  SHARED_ADMIN_EMAIL: ${{ secrets.SHARED_ADMIN_EMAIL }}
  SHARED_ADMIN_PASSWORD: ${{ secrets.SHARED_ADMIN_PASSWORD }}
  CLIENT_DEFAULT_PASSWORD: ${{ secrets.CLIENT_DEFAULT_PASSWORD }}
  PREVIEW_CLIENT_EMAIL: ${{ secrets.PREVIEW_CLIENT_EMAIL }}
  PREVIEW_CLIENT_PASSWORD: ${{ secrets.PREVIEW_CLIENT_PASSWORD }}
  SHARED_ADMIN_NAME: Portal Operator
  E2E_SURVEY_SLUG: ${{ secrets.E2E_SURVEY_SLUG }}
  E2E_INVITE_TOKEN: ${{ secrets.E2E_INVITE_TOKEN }}
  APP_URL: https://iam-check.vercel.app
  PLAYGROUND_SURVEY_SLUG: ${{ secrets.E2E_SURVEY_SLUG }}
  PLAYGROUND_SURVEY_ID: ${{ secrets.PLAYGROUND_SURVEY_ID }}
  PLAYGROUND_ASSIGNMENT_ID: ${{ secrets.PLAYGROUND_ASSIGNMENT_ID }}

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Portal checks
        run: npm run checks

      - name: Unit tests
        run: npm run test:unit

      - name: Interaction tests
        run: npm run test:interaction

      - name: Storybook static build
        run: npm run verify:storybook

      - name: Apply database migrations
        run: npm run db:migrate

      - name: Build
        run: npm run build

      - name: Seed shared operator account
        run: npm run seed:admin

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm run test:e2e:smoke

  journey:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npm run db:migrate

      - name: Build
        run: npm run build

      - name: Seed operator and preview client
        run: |
          npm run seed:admin
          npm run seed:preview-client

      - name: Materialize .env for E2E scripts
        run: npm run write:ci-env

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E journey tests
        run: npm run test:e2e:journey
