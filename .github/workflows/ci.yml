# ARCH-028 S8.1 / GUIDE-018 I5.5 — CI quality gate (turbo lint · typecheck · test)
# Remote cache: TURBO_TOKEN (Actions secret) + TURBO_TEAM (Actions variable)
# Deploy waits for this workflow to conclude success on main (workflow_run).
#
# Job `name: quality` is the PR required status-check context (`pnpm protect:main`).
# In-CI secrets: `secrets-presence` probes non-empty injection (no `gh secret list`).
# Ops name-list audit remains `pnpm audit:github-actions-secrets` (keyring gh).
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Check context for branch protection must equal this job name.
  quality:
    name: quality
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      # I5.5 — DB integration suites fail closed when missing (skip is not PASS).
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CI: "true"
      REQUIRE_DATABASE_TESTS: "1"

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Resolve pnpm from package.json "packageManager" (Corepack pin). Do not
      # also set "version" — pnpm/action-setup rejects dual sources.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Fail closed if DATABASE_URL missing
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::I5.5 quality DB gate BLOCKED — set Actions secret DATABASE_URL (repo or production). Owner: Platform. Skip is not PASS."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Database migration journal check
        run: pnpm --filter @afenda/db db:check

      - name: Tenancy soft-residue scan (N9 / ARCH-023 R1)
        run: pnpm check:tenancy-residue

      - name: Biome CI
        run: pnpm run lint:ci

      # docs-V2/docs/automation.md — lean docs gate (generate OpenAPI MDX + lint:links)
      - name: Docs app gate
        run: pnpm check:docs-app

      - name: Typecheck · test
        run: pnpm exec turbo run typecheck test

  # N9 / ARCH-023 — live null-org audit on eight hard tenant roots.
  # Uses production DATABASE_URL (same secret class as Deploy / N4 monitor).
  # Runs on main only so PR forks are not blocked on environment secrets.
  tenancy-nulls:
    name: Hard tenant-root null audit
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Zero null organization_id on eight hard roots
        run: pnpm audit:tenancy-nulls

  # GUIDE-018 I4 — standing Playwright @smoke gate (adverse matrix + factory).
  # Main only: needs Neon Auth + factory hash-template secrets (not available to forks).
  # E2E_REQUIRE_FACTORY=1 → missing factory env fails closed (skip is not PASS).
  # Factory password: prefer E2E_FACTORY_PASSWORD; else PREVIEW_CLIENT_PASSWORD as
  # hash-template plaintext only (never a Playwright login subject).
  e2e-smoke:
    name: E2E smoke (I4 standing gate)
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 35
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEON_AUTH_BASE_URL: ${{ secrets.NEON_AUTH_BASE_URL }}
      NEON_AUTH_COOKIE_SECRET: ${{ secrets.NEON_AUTH_COOKIE_SECRET }}
      APP_URL: ${{ secrets.APP_URL }}
      # Prefer dedicated factory secret; else hash-template plaintext (never login subject).
      E2E_FACTORY_PASSWORD: ${{ secrets.E2E_FACTORY_PASSWORD || secrets.PREVIEW_CLIENT_PASSWORD }}
      E2E_FACTORY_HASH_TEMPLATE_EMAIL: ${{ secrets.PREVIEW_CLIENT_EMAIL }}
      E2E_REQUIRE_FACTORY: "1"
      CI: "true"

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Fail closed if factory password missing
        run: |
          if [ -z "$E2E_FACTORY_PASSWORD" ]; then
            echo "::error::I4 standing E2E gate BLOCKED — set Actions secret E2E_FACTORY_PASSWORD (preferred) or PREVIEW_CLIENT_PASSWORD (hash-template plaintext). Owner: Platform."
            exit 1
          fi
          if [ -z "$DATABASE_URL" ] || [ -z "$NEON_AUTH_BASE_URL" ] || [ -z "$NEON_AUTH_COOKIE_SECRET" ] || [ -z "$APP_URL" ]; then
            echo "::error::I4 standing E2E gate BLOCKED — missing DATABASE_URL / NEON_AUTH_* / APP_URL. Owner: Platform."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @afenda/web
        run: pnpm exec turbo run build --filter=@afenda/web

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright @smoke (I4 adverse matrix)
        run: pnpm test:e2e:smoke

  # I5.5 — presence probe for required Actions secrets/vars (main only).
  # Does not call `gh secret list` (GITHUB_TOKEN cannot list names). Empty
  # `${{ secrets.* }}` / `${{ vars.* }}` injection fails closed.
  secrets-presence:
    name: secrets-presence
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 5
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEON_AUTH_BASE_URL: ${{ secrets.NEON_AUTH_BASE_URL }}
      NEON_AUTH_COOKIE_SECRET: ${{ secrets.NEON_AUTH_COOKIE_SECRET }}
      APP_URL: ${{ secrets.APP_URL }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      E2E_FACTORY_PASSWORD: ${{ secrets.E2E_FACTORY_PASSWORD }}
      PREVIEW_CLIENT_PASSWORD: ${{ secrets.PREVIEW_CLIENT_PASSWORD }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Fail closed if required secrets/vars empty
        # Pure Node — no install. Same catalog as `pnpm audit:github-actions-secrets`.
        run: node scripts/ci-secrets-presence.mjs
