# ARCH-022 / ARCH-028 S1.1 — pnpm workspaces (apps/* + packages/*).
# Catalog: shared direct-dep versions (external). Internal packages stay workspace:*.
packages:
  - "apps/*"
  - "packages/*"

catalog:
  # Framework (next and @next/env share the same range)
  next: ^16.2.10
  "@next/env": ^16.2.10
  react: ^19.2.7
  react-dom: ^19.2.7
  zod: ^4.4.3

  # Neon / data path (shared)
  "@neondatabase/auth": ^0.4.2-beta

  # UI / surface (apps/web + @afenda/ui-system)
  "@base-ui/react": ^1.6.0
  "@tanstack/react-table": ^8.21.3
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  cmdk: ^1.1.1
  date-fns: ^4.4.0
  lucide-react: ^1.23.0
  motion: ^12.42.2
  next-themes: ^0.4.6
  papaparse: ^5.5.4
  radix-ui: ^1.6.2
  react-payment-inputs: ^1.2.0
  recharts: ^3.9.2
  sonner: ^2.0.7
  tailwind-merge: ^3.6.0
  tw-animate-css: ^1.4.0
  xlsx: ^0.18.5
  zustand: ^5.0.14
  shadcn: ^4.13.0
  tailwindcss: ^4
  "@tailwindcss/postcss": ^4

  # Observability (platform logger + Prometheus metrics)
  pino: ^10.3.1
  prom-client: ^15.1.3

  # AI (The Machine — AI SDK + Gateway + React chat)
  ai: ^7.0.31
  "@ai-sdk/react": ^4.0.34

  # Rate limit (Upstash shared store)
  "@upstash/ratelimit": ^2.0.8
  "@upstash/redis": ^1.35.6

  # Types / tooling
  typescript: ^5
  "@types/node": ^20
  "@types/react": ^19
  "@types/react-dom": ^19
  "@types/papaparse": ^5.5.2
  "@biomejs/biome": ^2.5.3
  turbo: ^2.5.4
  tsx: ^4.23.0
  vite: ^6.4.3
  vitest: ^4.1.10
  "@vitejs/plugin-react": ^4.7.0
  "@testing-library/jest-dom": ^6.9.1
  "@testing-library/react": ^16.3.2
  "@testing-library/user-event": ^14.6.1
  jsdom: ^29.1.1

# Named catalogs for intentional version forks (do not merge into default).
catalogs:
  zod3:
    zod: ^3.25.76
